name: Build Flet APK
on: [push]

# 🟢 هنا زدت هاد الأمر ف السيستم كامل باش يسكت داك التنبيه د Node.js
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flet & Requests
        run: |
          pip install flet requests

      - name: Build APK
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_KEY }}
        # 🟢 زدنا --verbose هنا باش يوريك الجدر د المشكل فين كاين بالظبط إيلا طاح
        run: |
          flet build apk --project-name "NIBRAS AI" --product "Nibras AI" --build-version "1.0.0" --verbose

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nibras-apk
          path: build/apk/*.apk
