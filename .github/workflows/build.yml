name: Build Flet APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flet & Requests
        run: |
          pip install flet requests

      - name: Build APK
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_KEY }}
        run: |
          flet build apk --project-name "NIBRAS AI" --product "Nibras AI" --build-version "1.0.0"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nibras-apk
          path: build/apk/*.apk
